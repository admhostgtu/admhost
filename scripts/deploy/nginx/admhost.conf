# =============================================================================
# Configuration Nginx — AdmHost SaaS
# Copier dans /etc/nginx/sites-available/admhost
# =============================================================================

# Redirection HTTP → HTTPS (décommenter après certbot)
# server {
#     listen 80;
#     server_name admhost.example.com api.admhost.example.com admin.admhost.example.com;
#     return 301 https://$host$request_uri;
# }

# --- Frontend (site public) ---
server {
    listen 80;
    server_name admhost.example.com;
    root /var/www/admhost/frontend/public;
    index index.php;

    # Headers de sécurité
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # HTTPS only

    # Bloquer l'accès aux fichiers sensibles
    location ~ /\.(env|git|htaccess) { deny all; }
    location ~ /(shared|storage|scripts)/ { deny all; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        access_log off;
    }
}

# --- Backend API ---
server {
    listen 80;
    server_name api.admhost.example.com;
    root /var/www/admhost/backend/public;
    index index.php;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~ /\.(env|git|htaccess) { deny all; }
    location ~ /(shared|storage|scripts)/ { deny all; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Limiter la taille du body (webhooks Stripe)
    client_max_body_size 1m;
}

# --- Admin panel ---
server {
    listen 80;
    server_name admin.admhost.example.com;
    root /var/www/admhost/admin/public;
    index index.php;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Restreindre par IP (décommenter et adapter — complète ADMIN_ALLOWED_IPS côté PHP)
    # allow 203.0.113.0/24;
    # deny all;

    location ~ /\.(env|git|htaccess) { deny all; }
    location ~ /(shared|storage|scripts)/ { deny all; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
