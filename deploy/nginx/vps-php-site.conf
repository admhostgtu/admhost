# =============================================================================
# Nginx — Site PHP générique (vitrine / console / admin)
# Variables : __SERVER_NAME__ __ROOT__ __LOG_PREFIX__ __PHP_FPM_SOCKET__
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    root __ROOT__;
    index index.php;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~ /\.(env|git|htaccess) { deny all; return 404; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:__PHP_FPM_SOCKET__;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    client_max_body_size 4m;

    access_log /var/log/nginx/__LOG_PREFIX__.access.log;
    error_log  /var/log/nginx/__LOG_PREFIX__.error.log;
}
