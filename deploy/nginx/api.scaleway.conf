# =============================================================================
# Nginx — API Backend Scaleway (HTTP uniquement au premier déploiement)
# SSL : activer APRÈS vérification HTTP avec certbot
#   certbot --nginx -d api.tondomaine.com
# Puis décommenter deploy/nginx/api.scaleway.ssl.conf
# =============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.tondomaine.com;

    root /var/www/admhost/backend/public;
    index index.php;

    # Sécurité
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # Bloquer accès aux dossiers sensibles
    location ~ /\.(env|git|htaccess) { deny all; return 404; }
    location ~ ^/(shared|scripts|storage|frontend|admin)/ { deny all; return 404; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:__PHP_FPM_SOCKET__;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    client_max_body_size 2m;

    access_log /var/log/nginx/admhost-api.access.log;
    error_log  /var/log/nginx/admhost-api.error.log;
}

# =============================================================================
# NE PAS activer HTTPS avant que HTTP fonctionne !
# Après certbot, utiliser api.scaleway.ssl.conf ou la config générée par certbot
# =============================================================================
